const map = L.map('map').setView([8.5, 100.0], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

const phoneColors = {
  '66617480381': '#e74c3c',
  '66618860355': '#2ecc71',
  '66950322601': '#3498db'
};

const phoneLabels = {
  '66617480381': '0661-748-0381',
  '66618860355': '0661-886-0355',
  '66950322601': '0695-032-2601'
};

// Create layer groups per phone
const layers = {};
const clusterGroups = {};

function createCircleMarker(d) {
  const radius = Math.min(4 + Math.log2(d.count + 1) * 2, 14);
  const marker = L.circleMarker([d.lat, d.lon], {
    radius: radius,
    fillColor: d.color,
    color: '#fff',
    weight: 1.5,
    opacity: 0.9,
    fillOpacity: 0.7,
  });
  
  marker.bindPopup(`
    <div style="font-size:13px; line-height:1.6;">
      <b style="color:${d.color}">&#9679; ${phoneLabels[d.phone]}</b><br>
      <b>สถานี:</b> ${d.site}<br>
      <b>ตำแหน่ง:</b> ${d.location}<br>
      <b>พิกัด:</b> ${d.lat.toFixed(6)}, ${d.lon.toFixed(6)}<br>
      <b>บริการ:</b> ${d.services}<br>
      <b>จำนวนครั้ง:</b> ${d.count.toLocaleString()} ครั้ง<br>
      <b>ช่วงเวลา:</b><br>
      ${d.first_time} ถึง<br>${d.last_time}
    </div>
  `, { maxWidth: 320 });
  
  return marker;
}

Object.keys(phoneColors).forEach(phone => {
  clusterGroups[phone] = L.markerClusterGroup({
    maxClusterRadius: 40,
    iconCreateFunction: function(cluster) {
      const count = cluster.getChildCount();
      let size = count < 10 ? 'small' : count < 50 ? 'medium' : 'large';
      return L.divIcon({
        html: `<div style="background:${phoneColors[phone]}; color:white; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px; border:2px solid white; box-shadow:0 2px 6px rgba(0,0,0,0.3);">${count}</div>`,
        className: '',
        iconSize: [36, 36]
      });
    }
  });
  
  const phoneData = data.filter(d => d.phone === phone);
  phoneData.forEach(d => {
    clusterGroups[phone].addLayer(createCircleMarker(d));
  });
  
  clusterGroups[phone].addTo(map);
});

// Legend
const legend = L.control({ position: 'topright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<h4>CDR Map - หมายเลขโทรศัพท์</h4>';
  
  const visibility = {};
  
  Object.keys(phoneColors).forEach(phone => {
    visibility[phone] = true;
    const phoneData = data.filter(d => d.phone === phone);
    const item = L.DomUtil.create('div', 'legend-item', div);
    item.innerHTML = `<span class="legend-dot" style="background:${phoneColors[phone]}"></span> ${phoneLabels[phone]} (${phoneData.length} จุด)`;
    
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      visibility[phone] = !visibility[phone];
      if (visibility[phone]) {
        map.addLayer(clusterGroups[phone]);
        item.classList.remove('disabled');
      } else {
        map.removeLayer(clusterGroups[phone]);
        item.classList.add('disabled');
      }
    });
  });
  
  L.DomEvent.disableClickPropagation(div);
  return div;
};
legend.addTo(map);

// Info panel
const info = L.control({ position: 'bottomleft' });
info.onAdd = function() {
  const div = L.DomUtil.create('div', 'info-panel');
  const total = data.reduce((s, d) => s + d.count, 0);
  div.innerHTML = `
    <h4>ข้อมูลสรุป</h4>
    <b>ช่วงข้อมูล:</b> 1 ม.ค. - 12 มี.ค. 2569<br>
    <b>จำนวนจุดทั้งหมด:</b> ${data.length.toLocaleString()} จุด<br>
    <b>จำนวนครั้งทั้งหมด:</b> ${total.toLocaleString()} ครั้ง<br>
    <small>คลิกจุดบนแผนที่เพื่อดูรายละเอียด<br>คลิกชื่อในแผนที่สัญลักษณ์เพื่อซ่อน/แสดง</small>
  `;
  return div;
};
info.addTo(map);

// Fit bounds
const allLatLng = data.map(d => [d.lat, d.lon]);
if (allLatLng.length > 0) {
  map.fitBounds(allLatLng, { padding: [30, 30] });
}
</script>
